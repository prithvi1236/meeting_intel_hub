default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      # fetch("") returns "" → 0 worker processes and Solid Queue aborts; always at least 1
      processes: <%= [ ENV["JOB_CONCURRENCY"].to_i, 1 ].max %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

# Explicit production block avoids YAML-merge edge cases on some hosts; matches *default.
production:
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: <%= [ ENV["JOB_CONCURRENCY"].to_i, 1 ].max %>
      polling_interval: 0.1
