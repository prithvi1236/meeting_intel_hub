# Development uses Solid Cable (PostgreSQL) so broadcasts from bin/jobs (Solid Queue) reach the browser.
# The default "async" adapter is in-memory per process — ChatResponseJob / ExtractItemsJob would never
# deliver tokens to clients when jobs run in a separate process from Puma.
development:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
